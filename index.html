<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamData - Sleep Analyzer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --rem-color: #c084fc;
            --deep-color: #818cf8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: var(--accent);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .upload-section {
            text-align: center;
            margin-bottom: 40px;
        }
        input[type="file"] {
            display: none;
        }
        .upload-btn {
            background-color: var(--accent);
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .upload-btn:hover {
            opacity: 0.8;
        }
        .dashboard {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
        }
        .overall-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--deep-color);
        }
        .stat-box {
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .day-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .day-date {
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .day-stat {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }
        .insight {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #334155;
            font-size: 0.95rem;
            color: var(--rem-color);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>DreamData</h1>
    <p class="subtitle">A smart bridge between lines of code and the quality of your brain's rest</p>

    <div class="upload-section">
        <label for="json-upload" class="upload-btn">Select JSON data files from your data folder</label>
        <input type="file" id="json-upload" multiple accept=".json">
    </div>

    <div id="dashboard" class="dashboard">
        <h2>Overall Overview (Averages)</h2>
        <div class="overall-stats" id="overall-container">
            </div>

        <h2>Daily Breakdown</h2>
        <div class="daily-grid" id="daily-container">
            </div>
    </div>

    <script>
        document.getElementById('json-upload').addEventListener('change', handleFiles);

        function handleFiles(event) {
            const files = event.target.files;
            if (files.length === 0) return;

            let allData = [];
            let filesRead = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();

                reader.onload = function(e) {
                    try {
                        const json = JSON.parse(e.target.result);
                        allData.push(analyzeSingleNight(json));
                    } catch (err) {
                        console.error("Error reading file:", file.name);
                    }

                    filesRead++;
                    if (filesRead === files.length) {
                        // Sort by date ascending
                        allData.sort((a, b) => new Date(a.date) - new Date(b.date));
                        displayDashboard(allData);
                    }
                };
                reader.readAsText(file);
            }
        }

        // Function to analyze a single night and extract insights
        function analyzeSingleNight(data) {
            const dto = data.dailySleepDTO;
            const levels = data.sleepLevels || [];
            
            // Calculate duration from Garmin's raw seconds
            const totalHours = Math.floor(dto.sleepTimeSeconds / 3600);
            const totalMins = Math.floor((dto.sleepTimeSeconds % 3600) / 60);
            
            // Convert timestamps to clear readable times (AM/PM)
            const startTime = new Date(dto.sleepStartTimestampLocal).toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'});
            const endTime = new Date(dto.sleepEndTimestampLocal).toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'});

            // REM & Deep Sleep Analysis
            let remDurations = [];
            let deepCount = 0; // Used as a proxy for counting sleep cycles

            levels.forEach(level => {
                if (level.activityLevel === 2) { // 2 = REM
                    const start = new Date(level.startGMT).getTime();
                    const end = new Date(level.endGMT).getTime();
                    const durationMins = (end - start) / 1000 / 60;
                    remDurations.push(durationMins);
                }
                if (level.activityLevel === 0) { // 0 = Deep
                    deepCount++;
                }
            });

            // Sleep cycles calculation
            const sleepCycles = deepCount > 0 ? deepCount : 1; 

            // REM Calculations
            const totalRemMins = remDurations.reduce((a, b) => a + b, 0);
            const avgRem = remDurations.length > 0 ? Math.round(totalRemMins / remDurations.length) : 0;
            const maxRem = remDurations.length > 0 ? Math.round(Math.max(...remDurations)) : 0;

            // Generate daily insight
            let insight = "";
            if (sleepCycles >= 4 && avgRem > 15) {
                insight = "Your brain got excellent recovery tonight! A perfect day for complex learning and problem-solving.";
            } else if (totalHours < 6) {
                insight = "Relatively short sleep duration. Try to find some time to catch up on rest today.";
            } else if (avgRem === 0) {
                insight = "Your brain barely entered the dream stage (REM). This often happens during periods of stress or when sleep is interrupted.";
            } else {
                insight = "Solid rest. Your sleep cycles were stable and healthy.";
            }

            return {
                date: dto.calendarDate,
                startTime,
                endTime,
                totalHours,
                totalMins,
                sleepTimeSeconds: dto.sleepTimeSeconds,
                remCount: remDurations.length,
                avgRem,
                maxRem,
                sleepCycles,
                insight
            };
        }

        // Function to render everything onto the screen
        function displayDashboard(allData) {
            document.getElementById('dashboard').style.display = 'block';
            
            // 1. Calculate and display Overall Stats
            let totalSecs = 0, totalCycles = 0, totalAvgRem = 0;
            allData.forEach(day => {
                totalSecs += day.sleepTimeSeconds;
                totalCycles += day.sleepCycles;
                totalAvgRem += day.avgRem;
            });

            const daysCount = allData.length;
            const overallAvgHours = Math.floor((totalSecs / daysCount) / 3600);
            const overallAvgMins = Math.floor(((totalSecs / daysCount) % 3600) / 60);
            
            const overallHtml = `
                <div class="stat-box">
                    <div class="stat-value">${daysCount}</div>
                    <div class="stat-label">Nights Analyzed</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${overallAvgHours}h ${overallAvgMins}m</div>
                    <div class="stat-label">Avg Sleep per Night</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${(totalCycles / daysCount).toFixed(1)}</div>
                    <div class="stat-label">Avg Cycles per Night</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${Math.round(totalAvgRem / daysCount)} mins</div>
                    <div class="stat-label">Avg REM Duration</div>
                </div>
            `;
            document.getElementById('overall-container').innerHTML = overallHtml;

            // 2. Display Daily Breakdown Cards
            let dailyHtml = '';
            allData.forEach(day => {
                dailyHtml += `
                    <div class="day-card">
                        <div class="day-date">${day.date}</div>
                        <div class="day-stat"><span>Duration:</span> <span>${day.totalHours}h ${day.totalMins}m</span></div>
                        <div class="day-stat"><span>Fell asleep at:</span> <span>${day.startTime}</span></div>
                        <div class="day-stat"><span>Woke up at:</span> <span>${day.endTime}</span></div>
                        <div class="day-stat"><span>Sleep Cycles:</span> <span>${day.sleepCycles}</span></div>
                        <div class="day-stat"><span>Avg REM Time:</span> <span>${day.avgRem > 0 ? day.avgRem + " mins" : "Not measured"}</span></div>
                        <div class="day-stat"><span>Longest REM:</span> <span>${day.maxRem > 0 ? day.maxRem + " mins" : "-"}</span></div>
                        <div class="insight">💡 ${day.insight}</div>
                    </div>
                `;
            });
            document.getElementById('daily-container').innerHTML = dailyHtml;
        }
    </script>
</body>
</html>
